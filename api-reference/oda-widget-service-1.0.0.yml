openapi: 3.0.1
info:
  title: ODA Widget Service
  description: ODA Widget Service
  contact:
    name: stCarolas
    email: stcarolas@gmail.com
  license:
    name: AGPL-3.0
    url: https://www.gnu.org/licenses/agpl-3.0.en.html
  version: 1.0.0
tags:
- name: templates
  description: Template management operations
paths:
  /templates:
    get:
      tags:
      - templates
      summary: List templates
      description: Lists all templates for the authenticated user
      operationId: listTemplates
      parameters:
      - name: widget
        in: query
        required: true
        explode: false
        schema:
          type: string
      responses:
        "200":
          description: Templates retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TemplateDto"
        "401":
          description: Unauthorized
  /templates/commands/create:
    post:
      tags:
      - templates
      summary: Create template
      description: Creates a new template
      operationId: execute
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTemplateApi.CreateTemplateCommand"
        required: true
      responses:
        "200":
          description: Template created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TemplateDto"
        "401":
          description: Unauthorized
  /update/update:
    post:
      operationId: runUpdate
      responses:
        "200":
          description: runUpdate 200 response
  /widgets:
    get:
      summary: List widgets
      description: Lists all widgets for the authenticated user
      operationId: list
      responses:
        "200":
          description: Widgets retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WidgetDto"
        "401":
          description: Unauthorized
  /widgets/commands/add:
    post:
      summary: Add widget
      description: Creates a new widget
      operationId: addWidget
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddWidgetApi.NewWidgetRequest"
        required: true
      responses:
        "200":
          description: Widget created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WidgetDto"
        "401":
          description: Unauthorized
  /widgets/commands/reorder:
    post:
      summary: Reorder widgets
      description: Reorders widgets for the authenticated user
      operationId: reorder
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReorderCommand"
        required: true
      responses:
        "200":
          description: Widgets reordered successfully
        "401":
          description: Unauthorized
  /widgets/commands/toggle:
    post:
      summary: Toggle widget
      description: Toggles a widget by ID
      operationId: toggleWidget
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ToggleWidgetApi.ToogleWidgetRequest"
        required: true
      responses:
        "200":
          description: Widget toggled successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WidgetDto"
        "401":
          description: Unauthorized
        "404":
          description: Widget not found
  /widgets/{id}:
    get:
      summary: Get widget
      description: Gets a widget by ID
      operationId: get
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: Widget retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WidgetDto"
        "401":
          description: Unauthorized
        "404":
          description: Widget not found
    delete:
      summary: Delete widget
      description: Deletes a widget by ID
      operationId: delete
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: Widget deleted successfully
        "401":
          description: Unauthorized
        "404":
          description: Widget not found
    patch:
      summary: Update widget
      description: Updates a widget by ID
      operationId: update
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateWidgetRequest"
        required: true
      responses:
        "200":
          description: Widget updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WidgetDto"
        "401":
          description: Unauthorized
        "404":
          description: Widget not found
components:
  schemas:
    AddWidgetApi.NewWidgetRequest:
      required:
      - name
      - sortOrder
      - type
      type: object
      properties:
        type:
          type: string
        sortOrder:
          type: integer
          format: int32
        name:
          type: string
    CreateTemplateApi.CreateTemplateCommand:
      required:
      - properties
      - showcase
      - widgetType
      type: object
      properties:
        widgetType:
          type: string
        showcase:
          type: string
        properties:
          type: array
          items:
            type: object
            additionalProperties:
              type: object
    ReorderCommand:
      required:
      - ids
      type: object
      properties:
        ids:
          type: array
          items:
            type: string
    TemplateDto:
      required:
      - id
      - properties
      - recipientId
      - showcase
      type: object
      properties:
        id:
          type: string
        showcase:
          type: string
        properties:
          type: array
          items:
            type: object
            additionalProperties:
              type: object
        recipientId:
          type: string
    ToggleWidgetApi.ToogleWidgetRequest:
      required:
      - id
      type: object
      properties:
        id:
          type: string
    UpdateWidgetRequest:
      type: object
      properties:
        name:
          type: string
          nullable: true
        config:
          type: object
          additionalProperties:
            type: object
          nullable: true
        sortOrder:
          type: integer
          format: int32
          nullable: true
    WidgetDto:
      required:
      - config
      - deleted
      - enabled
      - id
      - name
      - ownerId
      - sortOrder
      - type
      type: object
      properties:
        id:
          type: string
        type:
          type: string
        sortOrder:
          type: integer
          format: int32
        name:
          type: string
        ownerId:
          type: string
        config:
          type: object
          additionalProperties:
            type: object
        enabled:
          type: boolean
        deleted:
          type: boolean
