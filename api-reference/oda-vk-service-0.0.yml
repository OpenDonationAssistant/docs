openapi: 3.0.1
info:
  title: oda-vk-service
  version: "0.0"
paths:
  /vklive/events:
    post:
      operationId: listenVklive
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/VkWebhook.Event"
        required: true
      responses:
        "200":
          description: listenVklive 200 response
components:
  schemas:
    VkWebhook.Demand:
      required:
      - id
      - message_parts
      - reward
      - user
      type: object
      properties:
        id:
          type: integer
          format: int64
        user:
          $ref: "#/components/schemas/VkWebhook.User"
        reward:
          $ref: "#/components/schemas/VkWebhook.Reward"
        message_parts:
          type: array
          items:
            type: object
            additionalProperties:
              $ref: "#/components/schemas/VkWebhook.Part"
    VkWebhook.Event:
      required:
      - demand
      - id
      - type
      - user_id
      type: object
      properties:
        id:
          type: string
        type:
          type: string
        user_id:
          type: string
        demand:
          $ref: "#/components/schemas/VkWebhook.Demand"
    VkWebhook.Part:
      required:
      - content
      type: object
      properties:
        content:
          type: string
    VkWebhook.Reward:
      required:
      - id
      type: object
      properties:
        id:
          type: string
    VkWebhook.User:
      required:
      - nick
      type: object
      properties:
        nick:
          type: string
