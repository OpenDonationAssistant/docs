openapi: 3.0.1
info:
  title: oda-media-service
  version: 1.0.0
tags:
- name: Available Media
  description: Search and retrieve available media from external providers
- name: Video
  description: Video management operations
- name: Playlist
  description: Playlist management operations
paths:
  /commands/media/linkPayment:
    post:
      operationId: linkPayment
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LinkPayment.LinkPaymentCommand"
        required: true
      responses:
        "200":
          description: linkPayment 200 response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HttpResponse_LinkPayment.LinkPaymentResponse_"
  /commands/media/markAllListened:
    post:
      operationId: markAllListened
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MarkAllListened.MarkAllListenedCommand"
        required: true
      responses:
        "200":
          description: markAllListened 200 response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HttpResponse_Void_"
  /media/available:
    get:
      tags:
      - Available Media
      summary: Get available media
      description: "Retrieves available videos from YouTube based on query, playlist\
        \ ID, or video ID. At least one of query, playlistId, or videoId must be provided."
      operationId: available
      parameters:
      - name: query
        in: query
        description: Search query for YouTube videos
        schema:
          type: string
          nullable: true
      - name: playlistId
        in: query
        description: YouTube playlist ID to retrieve videos from
        schema:
          type: string
          nullable: true
      - name: videoId
        in: query
        description: Specific YouTube video ID
        schema:
          type: string
          nullable: true
      responses:
        "200":
          description: List of available videos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Video"
        "500":
          description: Internal server error or video not found
  /media/playlists/{playlistId}:
    get:
      tags:
      - Playlist
      summary: Get playlist videos
      description: Retrieves videos from a YouTube playlist with shuffled order
      operationId: get
      parameters:
      - name: playlistId
        in: path
        description: YouTube playlist ID
        required: true
        schema:
          type: string
      responses:
        "200":
          description: Playlist with videos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Playlist"
  /media/video:
    get:
      tags:
      - Video
      summary: List authenticated user's videos
      description: Returns a list of ready videos for the authenticated recipient
      operationId: list
      responses:
        "200":
          description: List of user's videos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VideoData"
        "401":
          description: Unauthorized - authentication required
    put:
      operationId: prepareVideo
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PrepareVideo.PrepareVideoCommand"
        required: true
      responses:
        "200":
          description: prepareVideo 200 response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HttpResponse_PrepareVideo.PrepareVideoResponse_"
  /media/video/{ids}:
    get:
      tags:
      - Video
      summary: Get videos by IDs
      description: Retrieves video data for a comma-separated list of video IDs
      operationId: get_1
      parameters:
      - name: ids
        in: path
        description: Comma-separated video IDs
        required: true
        schema:
          type: string
      responses:
        "200":
          description: List of videos retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VideoData"
  /media/video/{id}:
    patch:
      tags:
      - Video
      summary: Mark video as handled
      description: Marks a video as handled by its ID
      operationId: update
      parameters:
      - name: id
        in: path
        description: Video ID to mark as handled
        required: true
        schema:
          type: string
      responses:
        "204":
          description: Video marked as handled
  /playlists:
    get:
      tags:
      - Playlist
      summary: List playlists
      description: Returns a paginated list of playlists for the authenticated user
      operationId: playlists
      parameters:
      - name: pageable
        in: query
        description: Pagination parameters
        required: true
        schema:
          $ref: "#/components/schemas/Pageable"
      responses:
        "200":
          description: Page of playlists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Page_Object_"
        "401":
          description: Unauthorized - authentication required
  /playlists/commands/create:
    post:
      operationId: create
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePlaylist.CreatePlaylistCommand"
        required: true
      responses:
        "200":
          description: create 200 response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlaylistDto"
  /playlists/commands/delete:
    post:
      operationId: deletePlaylist
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeletePlaylist.DeletePlaylistCommand"
        required: true
      responses:
        "200":
          description: deletePlaylist 200 response
  /playlists/{playlistId}:
    get:
      tags:
      - Playlist
      summary: Get playlist by ID
      description: Returns a specific playlist by its ID for the authenticated user
      operationId: playlist
      parameters:
      - name: playlistId
        in: path
        description: Playlist ID
        required: true
        schema:
          type: string
      responses:
        "200":
          description: Playlist details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlaylistDto"
        "401":
          description: Unauthorized - authentication required
        "404":
          description: Playlist not found
