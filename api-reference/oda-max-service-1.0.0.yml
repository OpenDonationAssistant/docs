openapi: 3.0.1
info:
  title: oda-max-service
  version: 1.0.0
paths:
  /max/accounts:
    get:
      operationId: accounts
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MaxController.AccountDto"
  /max/announcers:
    get:
      operationId: announcers
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AnnouncerData"
  /max/commands/add-announcer:
    post:
      operationId: addAnnouncer
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddAnnouncer.AddAnnouncerRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Void"
  /max/commands/delete-account:
    post:
      operationId: deleteAccount
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Void"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Void"
  /max/commands/generate-link:
    post:
      operationId: generateLink
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerateLink.TemporaryLink"
  /max/commands/list-available-chats:
    post:
      operationId: listAvailableChats
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ListAvailableChats.ChatDto"
  /max/commands/toggle-announcer:
    post:
      operationId: disableAnnouncer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Void"
components:
  schemas:
    AddAnnouncer.AddAnnouncerRequest:
      required:
      - buttons
      - chatId
      - text
      type: object
      properties:
        text:
          type: string
        chatId:
          type: integer
          format: int64
        buttons:
          type: array
          items:
            $ref: "#/components/schemas/AddAnnouncer.Button"
    AddAnnouncer.Button:
      required:
      - text
      - url
      type: object
      properties:
        text:
          type: string
        url:
          type: string
    AnnouncerData:
      required:
      - buttons
      - chatId
      - enabled
      - id
      - recipientId
      - text
      type: object
      properties:
        id:
          type: string
        recipientId:
          type: string
        chatId:
          type: integer
          format: int64
        text:
          type: string
        buttons:
          type: array
          items:
            $ref: "#/components/schemas/AnnouncerData.Button"
        enabled:
          type: boolean
    AnnouncerData.Button:
      required:
      - text
      - url
      type: object
      properties:
        text:
          type: string
        url:
          type: string
    GenerateLink.TemporaryLink:
      required:
      - link
      type: object
      properties:
        link:
          type: string
    ListAvailableChats.ChatDto:
      required:
      - id
      - title
      type: object
      properties:
        id:
          type: integer
          format: int64
        title:
          type: string
    MaxController.AccountDto:
      required:
      - id
      type: object
      properties:
        id:
          type: integer
          format: int64
    Void:
      type: object
