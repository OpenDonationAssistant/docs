openapi: 3.0.1
info:
  title: oda-max-service
  version: 1.0.0
paths:
  /max/accounts:
    get:
      operationId: accounts
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MaxController.AccountDto"
  /max/announcers:
    get:
      operationId: announcers
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MaxController.AnnouncerDto"
  /max/commands/add-announcer:
    post:
      operationId: addAnnouncer
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddAnnouncer.AddAnnouncerRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Void"
  /max/commands/delete-account:
    post:
      operationId: deleteAccount
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeleteAccount.DeleteAccountCommand"
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Void"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Void"
  /max/commands/generate-link:
    post:
      operationId: generateLink
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerateLink.TemporaryLink"
  /max/commands/list-available-chats:
    post:
      operationId: listAvailableChats
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ListAvailableChats.ChatDto"
  /max/commands/toggle-account:
    post:
      operationId: toggleAccount
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ToggleAccount.ToggleAccountCommand"
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Void"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Void"
  /max/commands/toggle-announcer:
    post:
      operationId: disableAnnouncer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Void"
  /max/commands/update-announcers:
    post:
      operationId: updateAnnouncer
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAnnouncer.UpdateAnnouncerRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Void"
components:
  schemas:
    AddAnnouncer.AddAnnouncerRequest:
      required:
      - accountId
      - buttons
      - chatId
      - text
      - trigger
      - type
      type: object
      properties:
        text:
          type: string
        accountId:
          type: string
        chatId:
          type: integer
          format: int64
        buttons:
          type: array
          items:
            $ref: "#/components/schemas/AddAnnouncer.Button"
        trigger:
          type: string
        type:
          $ref: "#/components/schemas/AnnouncerData.AnnouncerType"
    AddAnnouncer.Button:
      required:
      - text
      - url
      type: object
      properties:
        text:
          type: string
        url:
          type: string
    AnnouncerData.AnnouncerType:
      type: string
      enum:
      - ANNOUNCE_STREAM_AND_DELETE
      - ANNOUNCE_STREAM
    AnnouncerData.Button:
      required:
      - text
      - url
      type: object
      properties:
        text:
          type: string
        url:
          type: string
    DeleteAccount.DeleteAccountCommand:
      required:
      - id
      type: object
      properties:
        id:
          type: string
    GenerateLink.TemporaryLink:
      required:
      - link
      type: object
      properties:
        link:
          type: string
    ListAvailableChats.ChatDto:
      required:
      - id
      - title
      type: object
      properties:
        id:
          type: integer
          format: int64
        title:
          type: string
    MaxController.AccountDto:
      required:
      - enabled
      - id
      - maxId
      type: object
      properties:
        id:
          type: string
        maxId:
          type: integer
          format: int64
        enabled:
          type: boolean
    MaxController.AnnouncerDto:
      required:
      - accountId
      - announcerType
      - buttons
      - chatId
      - enabled
      - id
      - recipientId
      - text
      type: object
      properties:
        id:
          type: string
        recipientId:
          type: string
        accountId:
          type: string
        chatId:
          type: integer
          format: int64
        text:
          type: string
        buttons:
          type: array
          items:
            $ref: "#/components/schemas/AnnouncerData.Button"
        enabled:
          type: boolean
        announcerType:
          $ref: "#/components/schemas/AnnouncerData.AnnouncerType"
    ToggleAccount.ToggleAccountCommand:
      required:
      - enabled
      - id
      type: object
      properties:
        id:
          type: string
        enabled:
          type: boolean
    UpdateAnnouncer.AnnouncerUpdate:
      required:
      - id
      type: object
      properties:
        id:
          type: string
        text:
          type: string
          nullable: true
        buttons:
          type: array
          nullable: true
          items:
            $ref: "#/components/schemas/UpdateAnnouncer.Button"
        trigger:
          type: string
          nullable: true
        type:
          nullable: true
          allOf:
          - $ref: "#/components/schemas/AnnouncerData.AnnouncerType"
        enabled:
          type: boolean
          nullable: true
    UpdateAnnouncer.Button:
      required:
      - text
      - url
      type: object
      properties:
        text:
          type: string
        url:
          type: string
    UpdateAnnouncer.NewAnnouncer:
      required:
      - accountId
      - buttons
      - chatId
      - text
      - type
      type: object
      properties:
        text:
          type: string
        accountId:
          type: string
        chatId:
          type: integer
          format: int64
        buttons:
          type: array
          items:
            $ref: "#/components/schemas/UpdateAnnouncer.Button"
        type:
          $ref: "#/components/schemas/AnnouncerData.AnnouncerType"
    UpdateAnnouncer.UpdateAnnouncerRequest:
      required:
      - added
      - deleted
      - updated
      type: object
      properties:
        added:
          type: array
          items:
            $ref: "#/components/schemas/UpdateAnnouncer.NewAnnouncer"
        updated:
          type: array
          items:
            $ref: "#/components/schemas/UpdateAnnouncer.AnnouncerUpdate"
        deleted:
          type: array
          items:
            type: string
    Void:
      type: object
